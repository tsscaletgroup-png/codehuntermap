<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Hunter Map</title>
    <link href="https://unpkg.com/maplibre-gl@4.5.0/dist/maplibre-gl.css" rel="stylesheet"/>
    <script src="https://unpkg.com/maplibre-gl@4.5.0/dist/maplibre-gl.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; }

        #map { width: 100%; height: 100vh; }

        /* Legend */
        .legend {
            background: rgba(10,10,18,0.85);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 12px 16px;
            color: #e8e8f0;
            font-size: 12px;
            line-height: 1.5;
        }
        .legend b { display: block; font-size: 13px; margin-bottom: 2px; }
        .legend small { display: block; opacity: 0.5; font-size: 10px; margin-bottom: 10px; }
        .legend-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
        .legend-row:last-child { margin-bottom: 0; }
        .ldot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

        /* Popup */
        .maplibregl-popup-content {
            background: rgba(10,10,18,0.95) !important;
            color: #e8e8f0 !important;
            border: 1px solid rgba(255,255,255,0.1) !important;
            border-radius: 8px !important;
            padding: 10px 14px !important;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5) !important;
            font-family: sans-serif !important;
            font-size: 13px !important;
        }
        .maplibregl-popup-tip {
            border-top-color: rgba(10,10,18,0.95) !important;
            border-bottom-color: rgba(10,10,18,0.95) !important;
        }
        .maplibregl-popup-close-button { color: rgba(232,232,240,0.5) !important; font-size: 16px !important; }

        .pname { font-weight: bold; margin-bottom: 3px; }
        .ptype { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; }
        .psub  { font-size: 11px; margin-top: 4px; opacity: 0.5; }

        /* Controls */
        .maplibregl-ctrl-group {
            background: rgba(10,10,18,0.85) !important;
            border: 1px solid rgba(255,255,255,0.1) !important;
            border-radius: 8px !important;
        }
        .maplibregl-ctrl-group button { background: transparent !important; }
        .maplibregl-ctrl-group button span { filter: invert(1) opacity(0.7); }
        .maplibregl-ctrl-attrib {
            background: rgba(10,10,18,0.75) !important;
            color: rgba(232,232,240,0.4) !important;
            font-size: 10px !important;
        }
        .maplibregl-ctrl-attrib a { color: rgba(232,232,240,0.4) !important; }
        .maplibregl-ctrl-logo { display: none !important; }
    </style>
</head>
<body>

<div id="map"></div>

<script>
    var codeHunter = [
        { coords: [10.82, 46.22], name: "Madonna di Campiglio" },
        { coords: [10.91, 46.35], name: "Malé" },
        { coords: [11.09, 46.35], name: "Coredo" },
        { coords: [11.14, 46.40], name: "Cavareno" },
        { coords: [11.07, 46.19], name: "Fai della Paganella" },
        { coords: [10.96, 46.14], name: "Molveno" },
        { coords: [11.38, 45.38], name: "Lonigo" },
        { coords: [11.42, 45.36], name: "Alonte" },
        { coords: [11.53, 45.40], name: "Villaga" },
        { coords: [16.52, 40.17], name: "Rotondella" },
        { coords: [12.37, 46.42], name: "Pieve di Cadore" },
        { coords: [12.35, 46.39], name: "Perarolo di Cadore" }
    ];

    var partners = [
        { coords: [10.62, 59.90], name: "TurOrientering", subtitle: "www.turorientering.no" },
        { coords: [10.80, 59.90], name: "TurOrientering", subtitle: "www.turorientering.no" },
        { coords: [10.53, 59.89], name: "TurOrientering", subtitle: "www.turorientering.no" },
        { coords: [10.43, 59.83], name: "TurOrientering", subtitle: "www.turorientering.no" },
        { coords: [10.63, 59.67], name: "TurOrientering", subtitle: "www.turorientering.no" },
        { coords: [10.72, 59.44], name: "TurOrientering", subtitle: "www.turorientering.no" },
        { coords: [10.93, 59.24], name: "TurOrientering", subtitle: "www.turorientering.no" },
        { coords: [11.39, 59.14], name: "TurOrientering", subtitle: "www.turorientering.no" },
        { coords: [11.51, 58.99], name: "TurOrientering", subtitle: "www.turorientering.no" },
        { coords: [10.15, 59.76], name: "TurOrientering", subtitle: "www.turorientering.no" },
        { coords: [10.33, 59.55], name: "TurOrientering", subtitle: "www.turorientering.no" },
        { coords: [10.41, 59.28], name: "TurOrientering", subtitle: "www.turorientering.no" },
        { coords: [10.26, 59.12], name: "TurOrientering", subtitle: "www.turorientering.no" },
        { coords: [9.64,  59.16], name: "TurOrientering", subtitle: "www.turorientering.no" },
        { coords: [8.11,  58.19], name: "TurOrientering", subtitle: "www.turorientering.no" },
        { coords: [7.93,  58.19], name: "TurOrientering", subtitle: "www.turorientering.no" },
        { coords: [6.08,  58.48], name: "TurOrientering", subtitle: "www.turorientering.no" },
        { coords: [5.74,  58.83], name: "TurOrientering", subtitle: "www.turorientering.no" },
        { coords: [5.72,  58.95], name: "TurOrientering", subtitle: "www.turorientering.no" },
        { coords: [5.30,  59.44], name: "TurOrientering", subtitle: "www.turorientering.no" },
        { coords: [5.32,  60.34], name: "TurOrientering", subtitle: "www.turorientering.no" },
        { coords: [6.69,  61.49], name: "TurOrientering", subtitle: "www.turorientering.no" },
        { coords: [10.19, 60.09], name: "TurOrientering", subtitle: "www.turorientering.no" },
        { coords: [11.05, 60.81], name: "TurOrientering", subtitle: "www.turorientering.no" },
        { coords: [10.47, 63.39], name: "TurOrientering", subtitle: "www.turorientering.no" },
        { coords: [10.07, 63.59], name: "TurOrientering", subtitle: "www.turorientering.no" },
        { coords: [17.22, 68.72], name: "TurOrientering", subtitle: "www.turorientering.no" },
        { coords: [19.01, 69.59], name: "TurOrientering", subtitle: "www.turorientering.no" }
    ];

    function toGeoJSON(arr, type) {
        return {
            type: 'FeatureCollection',
            features: arr.map(function(loc) {
                return {
                    type: 'Feature',
                    geometry: { type: 'Point', coordinates: loc.coords },
                    properties: { name: loc.name, subtitle: loc.subtitle || '', type: type }
                };
            })
        };
    }

    var map = new maplibregl.Map({
        container: 'map',
        style: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
        center: [12.5, 42.5],
        zoom: 5.5,
        scrollZoom: false
    });

    map.addControl(new maplibregl.NavigationControl({ showCompass: false }), 'bottom-right');

    map.on('load', function() {

        map.addSource('ch', { type: 'geojson', data: toGeoJSON(codeHunter, 'ch') });
        map.addSource('pt', { type: 'geojson', data: toGeoJSON(partners, 'pt') });

        // Partner layers
        map.addLayer({ id: 'pt-glow', type: 'circle', source: 'pt',
            paint: { 'circle-radius': 14, 'circle-color': '#f7974f', 'circle-opacity': 0.15, 'circle-blur': 1 }
        });
        map.addLayer({ id: 'pt-dot', type: 'circle', source: 'pt',
            paint: {
                'circle-radius': ['interpolate', ['linear'], ['zoom'], 3, 5, 10, 8],
                'circle-color': '#f7974f', 'circle-opacity': 0.9,
                'circle-stroke-width': 1, 'circle-stroke-color': '#fff', 'circle-stroke-opacity': 0.25
            }
        });

        // Code Hunter layers
        map.addLayer({ id: 'ch-glow', type: 'circle', source: 'ch',
            paint: { 'circle-radius': 16, 'circle-color': '#4f8ef7', 'circle-opacity': 0.15, 'circle-blur': 1 }
        });
        map.addLayer({ id: 'ch-dot', type: 'circle', source: 'ch',
            paint: {
                'circle-radius': ['interpolate', ['linear'], ['zoom'], 3, 6, 10, 10],
                'circle-color': '#4f8ef7', 'circle-opacity': 0.95,
                'circle-stroke-width': 1.5, 'circle-stroke-color': '#fff', 'circle-stroke-opacity': 0.3
            }
        });

        // Popups
        function addPopup(layer, color) {
            map.on('click', layer, function(e) {
                var p = e.features[0].properties;
                new maplibregl.Popup({ offset: 10 })
                    .setLngLat(e.features[0].geometry.coordinates.slice())
                    .setHTML(
                        '<div class="pname">' + p.name + '</div>' +
                        '<div class="ptype" style="color:' + color + '">' + (p.type === 'ch' ? 'Code Hunter' : 'Partner') + '</div>' +
                        (p.subtitle ? '<div class="psub">' + p.subtitle + '</div>' : '')
                    )
                    .addTo(map);
            });
            map.on('mouseenter', layer, function() { map.getCanvas().style.cursor = 'pointer'; });
            map.on('mouseleave', layer, function() { map.getCanvas().style.cursor = ''; });
        }

        addPopup('ch-dot', '#4f8ef7');
        addPopup('pt-dot', '#f7974f');

        // Legend
        var LegendControl = function() {};
        LegendControl.prototype.onAdd = function() {
            this._container = document.createElement('div');
            this._container.className = 'legend maplibregl-ctrl';
            this._container.innerHTML =
                '<b>📍 Code Hunter & Partners</b>' +
                '<small>Location in Italia e all\'estero</small>' +
                '<div class="legend-row"><div class="ldot" style="background:#4f8ef7;box-shadow:0 0 5px #4f8ef7"></div><span>Code Hunter (' + codeHunter.length + ')</span></div>' +
                '<div class="legend-row"><div class="ldot" style="background:#f7974f;box-shadow:0 0 5px #f7974f"></div><span>Partner (' + partners.length + ')</span></div>';
            return this._container;
        };
        LegendControl.prototype.onRemove = function() {
            this._container.parentNode.removeChild(this._container);
        };
        map.addControl(new LegendControl(), 'top-left');
    });
</script>

</body>
</html>
